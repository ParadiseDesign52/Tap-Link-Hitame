  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
       background: linear-gradient(270deg, #000000, #800000, #000000);
       background-size: 400% 400%;
       animation: bgMove 10s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
}
     @keyframes bgMove {
     0% { background-position: 0% }
     50% { background-position: 100% }
     100% { background-position: 0% }
    }

    .container {
      animation: fadeIn 1s ease;
      text-align: center;
      max-width: 800px;
      width: 100%;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
    }

 .avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  transition: 0.3s;
}

.avatar:hover {
  transform: scale(1.3);
}
    }

    h1 {
      margin: 10px 0;
    }

    p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .link {
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  width: 100%;
max-width: 1000px;
  margin: 12px 0;        
  box-sizing: border-box;

  padding: 22px;
  font-size: 18px;

  border-radius: 14px;
  font-weight: bold;
  transition: 0.3s;
    }
.instagram {
  background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf);
  color: white;
}

.tiktok {
  background: linear-gradient(
    45deg,
    #000000 30%,
    #25F4EE 60%,
    #FE2C55 100%
  );
  color: white;
}
.youtube {
  background: linear-gradient(45deg, #ff0000, #ff4d4d, #cc0000);
  color: white;
}

.telegram {
  background: linear-gradient(45deg, #229ED9, #5abcf0);
  color: white;
}
.link:hover {
 transform: scale(1.05);          /* лёгкое увеличение */
  filter: brightness(1.15);        /* ярче */
  box-shadow: 0 8px 25px rgba(0,0,0,0.4); /* тень */
}
@media (max-width: 600px) {
.container {
    align-items: center;
  }
  .link {
    max-width: 300px;
    padding: 16px;   
    font-size: 16px; 
    margin-left: auto;
    margin-right: auto;
